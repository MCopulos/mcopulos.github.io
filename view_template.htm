  $file = 'view_template.txt';

  // Create the file with 0 if it doesn't exist
  if (!file_exists($file)) {
    file_put_contents($file, '0');
  }

  // Read current count
  $count = (int) file_get_contents($file);

  // Increment by 1
  $count++;

  // Save the new count
  file_put_contents($file, $count);
